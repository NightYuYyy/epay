services:
  postgres:
    image: postgres:15-alpine
    container_name: epay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-epay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-epay_pass}
      POSTGRES_DB: ${POSTGRES_DB:-epay}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-epay}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: epay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  epay:
    build: .
    container_name: epay-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      GIN_MODE: ${GIN_MODE:-release}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-epay}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-epay_pass}
      DB_NAME: ${POSTGRES_DB:-epay}
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
